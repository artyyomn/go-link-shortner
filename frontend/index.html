<!DOCTYPE html>
<html>
	<head>

		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<title>Link Shortener</title>

		<style>

@import url('https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap');

/* ================= THEME ================= */

:root{
	--bg:#1a1a1a;
	--card:rgba(255,255,255,0.05);
	--border:rgba(255,255,255,0.2);
	--input:rgba(255,255,255,0.08);
	--input-focus:rgba(255,255,255,0.12);
	--btn:rgba(255,255,255,0.12);
	--btn-hover:rgba(255,255,255,0.2);

	--text:#f5f5f5;
	--muted:#999;
	--sub:#aaa;
}

.light{
	--bg:#f5f5f5;
	--card:rgba(0,0,0,0.04);
	--border:rgba(0,0,0,0.15);
	--input:rgba(0,0,0,0.05);
	--input-focus:rgba(0,0,0,0.08);
	--btn:rgba(0,0,0,0.08);
	--btn-hover:rgba(0,0,0,0.15);

	--text:#111;
	--muted:#555;
	--sub:#666;
}

/* ================= BASE ================= */

*{
	box-sizing:border-box;
	margin:0;
	padding:0;
	font-family:"Datatype","Montserrat",sans-serif;
}

body{
	min-height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
	padding:20px;
	background:var(--bg);
	transition:.25s;
}

/* ================= CONTAINER ================= */

#container{
	position:relative;
	width:100%;
	max-width:500px;
	padding:32px 26px;
	border-radius:22px;

	background:var(--card);
	border:1px solid var(--border);

	/* subtle depth */
	box-shadow:
		0 12px 40px rgba(0,0,0,.35),
	inset 0 1px rgba(255,255,255,.05);

display:flex;
flex-direction:column;
gap:16px;
}

/* ================= TOGGLE ================= */

.themeBtn{
	position:absolute;
	top:14px;
	right:14px;

	width:38px;
	height:38px;

	display:flex;
	align-items:center;
	justify-content:center;

	border-radius:10px;
	padding:0;
	letter-spacing:0;
	line-height:1;
}

/* ================= TEXT ================= */

h2{
	color:var(--text);
	text-align:center;
}

.sub{
	font-size:.75rem;
	color:var(--sub);
	text-align:center;
}

/* ================= INPUT ================= */

.inputWrap{
	position:relative;
}

#link{
	width:100%;
	padding:14px 42px 14px 14px;
	border-radius:14px;
	border:1px solid var(--border);
	background:var(--input);
	color:var(--text);
}

#link:focus{
	outline:none;
	background:var(--input-focus);
}

/* clear button */

.clearBtn{
	position:absolute;
	right:10px;
	top:50%;
	transform:translateY(-50%);
	width:24px;
	height:24px;
	border-radius:6px;
	font-size:14px;
	display:flex;
	align-items:center;
	justify-content:center;
	padding:0;
	opacity:.6;
}

.clearBtn:hover{
	opacity:1;
}

/* ================= BUTTON ================= */

button{
	padding:13px;
	border-radius:12px;
	border:1px solid var(--border);
	background:var(--btn);
	color:var(--text);
	cursor:pointer;
	transition:.18s;
	letter-spacing:2px;
}

button:hover:not(:disabled){
	background:var(--btn-hover);
	transform:translateY(-1px);
}

button:disabled{
	opacity:.35;
}

/* ================= RESULT ================= */

#shortLink{
	min-height:46px;
	display:flex;
	flex-direction:column;
	gap:10px;
}

.resultRow{
	display:flex;
	gap:8px;
	animation:fade .25s ease;
}

.linkToCopy{
	flex:1;
	padding:12px;
	border-radius:12px;
	border:1px solid var(--border);
	background:var(--input);
	color:var(--text);
}

/* ================= QR ================= */

.qr{
	display:flex;
	justify-content:center;
	padding:10px;
}

/* ================= SPINNER ================= */

.spinner{
	width:16px;
	height:16px;
	border:2px solid transparent;
	border-top:2px solid currentColor;
	border-radius:50%;
	animation:spin .6s linear infinite;
}

/* ================= ANIMATIONS ================= */

@keyframes spin{
	to{ transform:rotate(360deg) }
}

@keyframes fade{
	from{opacity:0; transform:translateY(6px)}
	to{opacity:1; transform:translateY(0)}
}

/* ================= MSG ================= */

.msg{
	text-align:center;
	font-size:.75rem;
	color:var(--muted);
}

		</style>

	</head>

	<body>

		<div id="container">

			<button id="themeToggle" class="themeBtn">☀</button>

			<h2>Link-Shortner</h2>
			<div class="sub">fast minimal url cutter</div>

			<div class="inputWrap">

				<input id="link" placeholder="https://example.com"/>

				<button id="clearBtn" class="clearBtn">×</button>

			</div>

			<button id="submitBtn">CUT</button>

			<div id="shortLink"></div>

			<div id="msg" class="msg"></div>

		</div>

		<script>

			const linkInput = document.getElementById("link")
			const submitBtn = document.getElementById("submitBtn")
			const shortLinkContainer = document.getElementById("shortLink")
			const msg = document.getElementById("msg")
			const clearBtn = document.getElementById("clearBtn")
			const toggleBtn = document.getElementById("themeToggle")

			/* normalize */

			function normalize(url){
				if(!/^https?:\/\//i.test(url)){
					return "https://" + url.trim()
				}
			return url.trim()
}

			/* loading */

			function setLoading(state){
				if(state){
					submitBtn.innerHTML = '<div class="spinner"></div>'
					submitBtn.disabled = true
				}else{
					submitBtn.textContent = "CUT"
					submitBtn.disabled = false
				}
			}

			/* submit */

			async function submitLink(){

				let url = normalize(linkInput.value)

				if(!url){
					msg.textContent = "enter a url"
					return
				}

				try{

					setLoading(true)

					const res = await fetch("https://go-link-shortner.onrender.com/",{
						method:"POST",
						headers:{ "Content-Type":"application/json" },
						body:JSON.stringify({ long:url, short:"" })
					})

					const data = await res.json()

					const short = "https://go-link-shortner.onrender.com/" + data

					const wrapper = document.createElement("div")
					wrapper.className = "resultRow"

					const input = document.createElement("input")
					input.className = "linkToCopy"
					input.value = short
					input.readOnly = true

					/* copy on click */

					input.onclick = async ()=>{
						await navigator.clipboard.writeText(short)
						msg.textContent = "copied"
					}

					wrapper.appendChild(input)

					shortLinkContainer.innerHTML = ""
					shortLinkContainer.appendChild(wrapper)

					/* QR */

					const qr = document.createElement("img")
					qr.src = "https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=" + encodeURIComponent(short)
					qr.className = "qr"

					shortLinkContainer.appendChild(qr)

				}
				catch{
					msg.textContent = "error"
				}
				finally{
					setLoading(false)
				}

			}

			/* events */

			submitBtn.onclick = submitLink

			linkInput.addEventListener("keydown", e=>{
				if(e.key==="Enter") submitLink()
			})

			/* paste detect */

			linkInput.addEventListener("paste", ()=>{
				setTimeout(()=>{
					submitBtn.disabled = linkInput.value.trim().length === 0
				},0)
			})

			linkInput.addEventListener("input", ()=>{
				submitBtn.disabled = linkInput.value.trim().length === 0
			})

			/* clear */

			clearBtn.onclick = ()=>{
				linkInput.value = ""
				shortLinkContainer.innerHTML = ""
				msg.textContent = ""
				submitBtn.disabled = true
				linkInput.focus()
			}

			/* theme */

			function applyTheme(theme){

				if(theme==="light"){
					document.documentElement.classList.add("light")
					toggleBtn.textContent = "🌙"
				}else{
					document.documentElement.classList.remove("light")
					toggleBtn.textContent = "☀"
				}

				localStorage.setItem("theme",theme)
			}

			toggleBtn.onclick = ()=>{
				const isLight = document.documentElement.classList.contains("light")
				applyTheme(isLight ? "dark" : "light")
			}

			const saved = localStorage.getItem("theme")

			if(saved){
				applyTheme(saved)
			}else{
				const prefersLight = window.matchMedia("(prefers-color-scheme: light)").matches
				applyTheme(prefersLight ? "light" : "dark")
			}

			submitBtn.disabled = true

		</script>

	</body>
</html>
