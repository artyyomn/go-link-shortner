<!DOCTYPE html>
<html>
	<head>

		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<title>Link Shortener</title>

		<style>
@import url('https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100..900&display=swap');

:root{

	--bg:#1a1a1a;
	--card:rgba(255,255,255,0.05);
	--border:rgba(255,255,255,0.2);
	--input:rgba(255,255,255,0.08);
	--input-focus:rgba(255,255,255,0.12);
	--btn:rgba(255,255,255,0.12);
	--btn-hover:rgba(255,255,255,0.2);

	--text:#f5f5f5;
	--muted:#999;
	--sub:#aaa;

}

.light{

	--bg:#f5f5f5;
	--card:rgba(0,0,0,0.04);
	--border:rgba(0,0,0,0.15);
	--input:rgba(0,0,0,0.05);
	--input-focus:rgba(0,0,0,0.08);
	--btn:rgba(0,0,0,0.08);
	--btn-hover:rgba(0,0,0,0.15);

	--text:#111;
	--muted:#555;
	--sub:#666;

}

*{
	box-sizing:border-box;
	margin:0;
	padding:0;
	font-family:"Datatype","Montserrat",sans-serif;
}

body{

	min-height:100vh;
	display:flex;
	justify-content:center;
	align-items:center;
	padding:20px;

	background:var(--bg);
	transition:.25s;

}

#container{

	position:relative;
	width:100%;
	max-width:500px;

	padding:32px 26px;
	border-radius:22px;

	background:var(--card);
	border:1px solid var(--border);

	display:flex;
	flex-direction:column;
	gap:16px;

}

.themeBtn{

	position:absolute;
	top:14px;
	right:14px;

	width:38px;
	height:38px;

	border-radius:10px;

	display:flex;
	align-items:center;
	justify-content:center;

	font-size:16px;

}

h2{

	color:var(--text);
	font-size:1.35rem;
	font-weight:500;
	text-align:center;
	letter-spacing:1px;

}

.sub{

	font-size:.75rem;
	color:var(--sub);
	text-align:center;
	letter-spacing:1px;

}

.inputWrap{

	display:flex;
	flex-direction:column;
	gap:6px;

}

label{

	font-size:.7rem;
	letter-spacing:2px;
	color:var(--muted);

}

.inputBox{

	position:relative;
	width:100%;

}

#link{

	width:100%;
	padding:14px;
	padding-right:40px;

	border-radius:14px;
	border:1px solid var(--border);

	background:var(--input);
	color:var(--text);

	font-size:.95rem;
	transition:.2s;

}

#link:focus{

	outline:none;
	background:var(--input-focus);

}

.clearBtn{

	position:absolute;
	right:8px;
	top:50%;
	transform:translateY(-50%);

	width:28px;
	height:28px;

	border-radius:8px;
	border:none;

	background:transparent;

	display:flex;
	align-items:center;
	justify-content:center;

	font-size:14px;

	color:var(--muted);

	cursor:pointer;

	opacity:0;
	pointer-events:none;

	transition:.15s;

}

.clearBtn.show{

	opacity:.7;
	pointer-events:auto;

}

.clearBtn:hover{

	opacity:1;
	color:var(--text);

}

button{

	padding:13px;

	border-radius:12px;
	border:1px solid var(--border);

	background:var(--btn);
	color:var(--text);

	font-size:.95rem;

	cursor:pointer;

	letter-spacing:2px;

}

button:hover:not(:disabled){

	background:var(--btn-hover);

}

button:disabled{

	opacity:.35;
	cursor:not-allowed;

}

#shortLink{

	min-height:46px;
	display:flex;
	align-items:center;

}

.resultRow{

	display:flex;
	gap:8px;
	width:100%;

}

.linkToCopy{

	flex:1;
	padding:12px;

	border-radius:12px;
	border:1px solid var(--border);

	background:var(--input);
	color:var(--text);

}

.copyBtn{

	width:44px;
	height:44px;

	border-radius:10px;

	display:flex;
	align-items:center;
	justify-content:center;

}

.msg{

	font-size:.75rem;
	color:var(--muted);
	text-align:center;

}

.loading{

	opacity:.6;
	pointer-events:none;

}

		</style>

	</head>

	<body>

		<div id="container">

			<button id="themeToggle" class="themeBtn">☀</button>

			<h2>Link-Shortner</h2>
			<div class="sub">fast minimal url cutter</div>

			<div class="inputWrap">

				<label>PASTE URL</label>

				<div class="inputBox">

					<input
							id="link"
							type="text"
							placeholder="https://example.com/very/long/link"
							/>

					<button id="clearBtn" class="clearBtn">✕</button>

				</div>

			</div>

			<button id="submitBtn">CUT</button>

			<div id="shortLink"></div>

			<div id="msg" class="msg"></div>

		</div>

		<script>
			const linkInput = document.getElementById("link")
			const clearBtn = document.getElementById("clearBtn")
			const submitBtn = document.getElementById("submitBtn")
			const shortLinkContainer = document.getElementById("shortLink")
			const msg = document.getElementById("msg")
			const toggleBtn = document.getElementById("themeToggle")

			function validate(url){
				try{
					new URL(url)
					return true
				}catch{
					return false
				}
			}

			function setLoading(state){
				if(state){
					submitBtn.textContent="CUTTING..."
					submitBtn.disabled=true
				}else{
					submitBtn.textContent="CUT"
					submitBtn.disabled=false
				}
			}

			function toggleClear(){
				if(linkInput.value.trim()){
					clearBtn.classList.add("show")
				}else{
					clearBtn.classList.remove("show")
				}
			}

			clearBtn.onclick=()=>{
				linkInput.value=""
				toggleClear()
				submitBtn.disabled=true
				linkInput.focus()
			}

			async function submitLink(){
				const url = linkInput.value.trim()

				if(!url){
					msg.textContent="enter a url"
					return
				}

				if(!validate(url)){
					msg.textContent="invalid url"
					return
				}

				msg.textContent=""

				try{
					setLoading(true)

					const res = await fetch(
						"https://go-link-shortner.onrender.com/",
						{
							method:"POST",
							headers:{ "Content-Type":"application/json" },
							body:JSON.stringify({ long:url, short:"" })
						}
					)

					const data = await res.json()

					const wrapper = document.createElement("div")
					wrapper.className="resultRow"

					const returnedLink = document.createElement("input")
					returnedLink.className="linkToCopy"
					returnedLink.readOnly = true
					returnedLink.value =
						"https://go-link-shortner.onrender.com/" + data

					const copyBtn = document.createElement("button")
					copyBtn.className="copyBtn"
					copyBtn.innerHTML = iconCopy()   // FIX: add icon

					wrapper.appendChild(returnedLink)
					wrapper.appendChild(copyBtn)

					shortLinkContainer.innerHTML = ""   // FIX: clear properly
					shortLinkContainer.appendChild(wrapper)

					copyBtn.onclick = async ()=>{
						await navigator.clipboard.writeText(returnedLink.value)
						copyBtn.innerHTML = iconCheck()
						msg.textContent = "copied"
					}

				}catch{
					msg.textContent="network error"
				}finally{
					setLoading(false)
				}
			}

			submitBtn.onclick = submitLink

			linkInput.addEventListener("input", ()=>{
				submitBtn.disabled = linkInput.value.trim().length===0
				toggleClear()
			})

			linkInput.addEventListener("keydown", e=>{
				if(e.key==="Enter"){
					submitLink()
				}
			})

			submitBtn.disabled=true

			function iconCopy(){
				return `
<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="2">
<rect x="9" y="9" width="13" height="13" rx="2"/>
<path d="M5 15H4a2 2 0 0 1-2-2V4
a2 2 0 0 1 2-2h9
a2 2 0 0 1 2 2v1"/>
</svg>`
			}

			function iconCheck(){
				return `
<svg xmlns="http://www.w3.org/2000/svg"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="3">
<polyline points="20 6 9 17 4 12"/>
</svg>`
			}

			function applyTheme(theme){
				if(theme==="light"){
					document.documentElement.classList.add("light")
					toggleBtn.textContent="🌙"
				}else{
					document.documentElement.classList.remove("light")
					toggleBtn.textContent="☀"
				}
				localStorage.setItem("theme", theme)
			}

			toggleBtn.onclick=()=>{
				const isLight =
					document.documentElement.classList.contains("light")
				applyTheme(isLight ? "dark" : "light")
			}

			const saved = localStorage.getItem("theme")

			if(saved){
				applyTheme(saved)
			}else{
				const prefersLight =
					window.matchMedia("(prefers-color-scheme: light)").matches
				applyTheme(prefersLight ? "light" : "dark")
			}
		</script>

	</body>
</html>
