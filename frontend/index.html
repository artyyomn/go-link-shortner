<!DOCTYPE html>
<html>
	<head>

		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">

		<title>Link Shortener</title>

		<style>
@import url('https://fonts.googleapis.com/css2?family=Datatype:wght@100..900&display=swap');
@import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap');

*{
	box-sizing:border-box;
	margin:0;
	padding:0;
	font-family: "Montserrat"
}

			body{
				min-height:100vh;
				display:flex;
				justify-content:center;
				align-items:center;
				padding:20px;

				/* Monochrome animated gradient */
				background:linear-gradient(
					135deg,
					#000000,
					#1a1a1a,
					#2b2b2b,
					#111111,
					#3a3a3a,
					#000000
						);
				background-size:400% 400%;
				animation:gradientMove 20s ease infinite;
			}

			@keyframes gradientMove{
				0%{background-position:0% 50%}
				50%{background-position:100% 50%}
				100%{background-position:0% 50%}
			}

			#container{
				width:100%;
				max-width:500px;
				padding:32px 26px;
				border-radius:22px;

				/* Dark glass */
				background:rgba(255,255,255,0.06);
				backdrop-filter:blur(22px);
				-webkit-backdrop-filter:blur(22px);
				border:1px solid rgba(255,255,255,0.15);
				box-shadow:
					0 10px 40px rgba(0,0,0,0.7),
				inset 0 1px rgba(255,255,255,0.15);
			display:flex;
			flex-direction:column;
			gap:14px;
			}

			h2{
				color:#f5f5f5;
				font-size:1.3rem;
				font-weight:500;
				text-align:center;
				letter-spacing:1px;
			}

			/* Input */

			#link{
				width:100%;
				padding:14px;
				border-radius:14px;
				border:1px solid rgba(255,255,255,0.18);
				background:rgba(255,255,255,0.08);
				color:#ffffff;
				font-size:0.95rem;
				backdrop-filter:blur(8px);
				transition:all .25s;
			}

			#link::placeholder{
				color:#bbbbbb;
				font-family: "Datatype"
			}

			#link:focus{
				outline:none;
				border:1px solid rgba(255,255,255,0.4);
				background:rgba(255,255,255,0.12);
			}

			/* Buttons */

			button{
				padding:12px 16px;
				border-radius:12px;
				border:1px solid rgba(255,255,255,0.2);
				background:rgba(255,255,255,0.12);
				color:#ffffff;
				font-size:1rem;
				cursor:pointer;
				backdrop-filter:blur(8px);
				transition:all .2s;
			}

			button:hover{
				background:rgba(255,255,255,0.2);
				transform:translateY(-1px);
			}

			button:active{
				transform:scale(.96);
			}

			/* Short link */
			#shortLink{
				margin-top:6px;
				display:flex;
				flex-direction:column;
				align-items:center;
				gap:10px;
				text-align:center;
			}

			#linkToCopy{
				color:#eaeaea;
				font-size:0.9rem;
				word-break:break-all;
				cursor:pointer;
				line-height:1.4;
				opacity:.9;
			}

			#linkToCopy:hover{
				opacity:1;
				text-decoration:underline;
			}

			/* Mobile */
			@media (max-width:480px){
				#container{
					padding:26px 20px;
				}
				h2{
					font-size:1.1rem;
				}
				#link{
					font-size:0.9rem;
					padding:12px;
				}
				button{
					font-size:0.85rem;
					padding:11px;
				}
			}

			#shortLink{
				margin-top:10px;
				display:flex;
				justify-content:center;
			}

			.resultRow{
				display:flex;
				width:100%;
				gap:8px;
				align-items:center;
			}

			/* textbox */

			#linkToCopy{
				flex:1;
				padding:12px;
				border-radius:12px;
				border:1px solid rgba(255,255,255,0.18);
				background:rgba(255,255,255,0.08);
				color:#ffffff;
				font-size:0.9rem;
				backdrop-filter:blur(8px);
			}

			/* copy icon button */

			#copyBtn{
				display:flex;
				justify-content:center;
				align-items:center;
				width:42px;
				height:42px;
				font-size:18px;
				border-radius:10px;
				padding:0;
			}
			#copyBtn svg{
				width:18px;
				height:18px;
				pointer-events:none;
			}
		</style>
	</head>

	<body>

		<div id="container">

			<h2>Link-Circumciser</h2>

			<input type="text" placeholder="paste-url-here" id="link">

			<button onClick="SubmitLink()">CUT</button>

			<div id="shortLink"></div>

		</div>

		<script>

			let Link = document.getElementById("link")

			const sanitizeLink = async (link) =>{
				linkString = String(link)

				if(linkString.length === 0){
					return ""
				}

				return linkString
			}

			const SubmitLink = async () =>{

				const wrapper = document.createElement("div")
				wrapper.className="resultRow"

				const returnedLink = document.createElement("input")
				returnedLink.id="linkToCopy"
				returnedLink.readOnly=true

				const copyBtn = document.createElement("button")
				copyBtn.id="copyBtn"
				copyBtn.innerHTML = `
<svg xmlns="http://www.w3.org/2000/svg" 
width="18" height="18" 
viewBox="0 0 24 24" 
fill="none" 
stroke="currentColor" 
stroke-width="2" 
stroke-linecap="round" 
stroke-linejoin="round">

<rect x="9" y="9" width="13" height="13" rx="2"></rect>
<path d="M5 15H4a2 2 0 0 1-2-2V4
a2 2 0 0 1 2-2h9
a2 2 0 0 1 2 2v1"></path>

</svg>
`

				try{

					let linkValue = Link.value
					let goodLink = await sanitizeLink(linkValue)

					const res = await fetch("https://go-link-shortner.onrender.com/",{
						method:"POST",
						headers:{
							"Content-Type":"application/json"
						},
						body:JSON.stringify({
							"long":goodLink,
							"short":""
						})
					})

					const data = await res.json()

					returnedLink.value =
						"go-link-shortner.onrender.com/"+data

					wrapper.appendChild(returnedLink)
					wrapper.appendChild(copyBtn)

					shortLink.innerHTML=""
					shortLink.appendChild(wrapper)

				}catch(err){
					console.error("fetch error",err)
				}

				copyBtn.addEventListener("click", async ()=>{
					try{
						await navigator.clipboard.writeText(returnedLink.value)
						copyBtn.innerHTML=`
<svg xmlns="http://www.w3.org/2000/svg" 
width="18" height="18"
viewBox="0 0 24 24"
fill="none"
stroke="currentColor"
stroke-width="3"
stroke-linecap="round"
stroke-linejoin="round">
<polyline points="20 6 9 17 4 12"></polyline>
</svg>
`
					}catch(err){
						console.error("unable to copy",err)
					}
				})			})

			linkToCopy.addEventListener("click", async ()=>{
				try{
					await navigator.clipboard.writeText(linkToCopy.textContent)
					copyBtn.textContent="copied ✓"
				}catch(err){
					console.error("unable to copy",err)
				}
			})

}

		</script>

	</body>
</html>
